  <!-- subtle brand glow -->
  <path d="M88 32 H168 L224 88 V168 L168 224 H88 L32 168 V88 Z"
        fill="none" stroke="#6366F1" stroke-width="58" stroke-linejoin="round" opacity="0.16"/>
  <!-- the octagon ring -->
  <path d="M88 32 H168 L224 88 V168 L168 224 H88 L32 168 V88 Z"
        fill="none" stroke="#6366F1" stroke-width="30" stroke-linejoin="round"/>
</svg>
